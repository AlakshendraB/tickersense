<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TickerSense</title>
  <link rel="stylesheet" href="styles/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <h2 id="stock-name">📈 Upload a CSV file</h2>

  <input type="file" id="csvFile" accept=".csv" />
  <button onclick="handleCSV()">Upload CSV</button>

  <canvas id="stockChart" width="600" height="300"></canvas>

  <div id="ai-box">
    <textarea id="user-input" placeholder="Ask the AI about this stock..."></textarea>
    <button onclick="askAI()">Ask AI</button>
    <div id="ai-response"></div>
  </div>

  <script src="js/chart.js"></script>
</body>
</html>
