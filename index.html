<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TickerSense</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap Dark -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
</head>
<body class="bg-dark text-light">
<h2 id="stock-name">📈 Upload a CSV to view the stock</h2>

<input type="file" id="csvFile" accept=".csv" />
<button onclick="handleCSV()">Upload CSV</button>

<canvas id="chart"></canvas> <!-- assuming you're using Chart.js -->

<!-- PapaParse (CSV parser) CDN -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="js/chart.js"></script> <!-- your chart code -->

  <nav class="navbar navbar-dark bg-black px-4">
    <span class="navbar-brand mb-0 h1">📈 TickerSense</span>
  </nav>

  <div class="container mt-4">
    <h2>Stock Visualizer</h2>
    <canvas id="stockChart"></canvas>
  </div>

  <div class="container mt-5">
    <h4>Upload CSV</h4>
    <input type="file" id="csvFile" class="form-control" accept=".csv" />
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/csvParser.js"></script>
</body>
</html>
